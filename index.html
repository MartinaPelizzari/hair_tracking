<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Hair Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-panna: #fdfcfb;
            --azzurro-polvere: #d6e4f0;
            --azzurro-leggero: #f0f7ff;
            --lavanda: #e3dff2;
            --pervinca: #b8c1ec;
            --text-dark: #2d3436;
            --text-light: #9aa0a6;
            --white: #ffffff;
            --shadow-soft: 0 8px 30px rgba(0,0,0,0.04);
            --radius: 20px;
            --color-danger: #ff7675;  
            --color-warning: #fdcb6e; 
            --color-success: #27ae60; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg-panna); 
            color: var(--text-dark); 
            margin: 0; padding: 0; 
            line-height: 1.6; 
            touch-action: manipulation; 
        }
        
        #app { 
            max-width: 500px; 
            margin: 0 auto; 
            padding: max(30px, env(safe-area-inset-top)) 20px calc(130px + env(safe-area-inset-bottom)) 20px; 
        }
        
        header { margin-bottom: 25px; }
        h1 { font-weight: 300; font-size: 1.8rem; color: var(--pervinca); margin: 0; }
        h2 { font-size: 1.2rem; font-weight: 500; margin-bottom: 15px; }

        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--white); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow-soft); border: 1px solid rgba(184, 193, 236, 0.2); }
        .btn-submit, .btn-action { border: none; padding: 16px; border-radius: 15px; width: 100%; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .btn-submit { background: var(--pervinca); color: white; font-weight: 600; margin-top: 10px; }
        .btn-action { background: var(--azzurro-polvere); color: var(--text-dark); font-weight: 600; padding: 12px; }

        .icon-btn {
            background: none; border: none; cursor: pointer;
            font-size: 1.4rem; padding: 12px; color: var(--text-light);
            transition: 0.2s; border-radius: 50%;
        }
        .icon-btn.edit { color: var(--text-dark); }
        .icon-btn.delete { color: var(--color-danger); }

        .btn-square {
            background: var(--white); border: 1px solid rgba(184, 193, 236, 0.3); border-radius: var(--radius);
            padding: 20px 25px; font-size: 1.15rem; font-weight: 600; color: var(--text-dark); cursor: pointer;
            box-shadow: var(--shadow-soft); transition: 0.2s; display: flex; align-items: center; justify-content: flex-start; gap: 20px;
        }
        .btn-square i { font-size: 2.2rem; color: var(--pervinca); }

        input, textarea { width: 100%; padding: 12px 15px; margin-top: 8px; margin-bottom: 15px; border: 1px solid var(--azzurro-polvere); border-radius: 12px; background: var(--bg-panna); font-size: 1rem; font-family: inherit; }

        .custom-select {
            width: 100%; appearance: none; background-color: var(--white);
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23b8c1ec' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 15px center; background-size: 18px;
            border: 2px solid var(--azzurro-polvere); padding: 16px 20px; border-radius: 16px;
            font-size: 1.05rem; font-weight: 600; color: var(--text-dark); margin-bottom: 20px;
            cursor: pointer; box-shadow: var(--shadow-soft);
        }

        .bottom-nav {
            position: fixed; bottom: calc(15px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 350px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; align-items: center; padding: 12px 20px; border-radius: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); z-index: 1000;
        }
        .nav-item { color: var(--text-light); text-decoration: none; display: flex; align-items: center; justify-content: center; transition: 0.3s; padding: 10px; }
        .nav-item i { font-size: 1.6rem; }
        .nav-item.active { color: var(--pervinca); }
        
        .nav-center-btn {
            background: var(--bg-panna); color: var(--text-light); border: 3px solid var(--text-light); border-radius: 50%;
            width: 75px; height: 75px; display: flex; justify-content: center; align-items: center;
            transform: translateY(-25px); box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05); text-decoration: none; transition: 0.2s;
        }
        .nav-center-btn i { font-size: 2.2rem; }
        .nav-center-btn.active { background: var(--lavanda); color: var(--pervinca); border-color: var(--pervinca); box-shadow: 0 8px 20px rgba(184, 193, 236, 0.4); }

        .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 15px; background: var(--bg-panna); padding: 10px; border-radius: 12px; border: 1px solid var(--azzurro-polvere); }
        .emoji-item { text-align: center; font-size: 1.5rem; padding: 5px 0; border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
        .emoji-item.selected { background: var(--azzurro-polvere); border-color: var(--pervinca); transform: scale(1.1); }

        /* --- FIX HEADER CALENDARIO --- */
        .cal-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px;
            width: 100%;
        }
        .cal-nav { 
            background: none; 
            border: none; 
            font-size: 2rem; /* Più grandi */
            color: var(--pervinca); 
            cursor: pointer; 
            padding: 10px;
            min-width: 60px; /* Area di tocco sicura */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #calendar-month-name {
            font-size: 1.2rem;
            font-weight: 600;
            flex-grow: 1;
            text-align: center;
            white-space: nowrap;
        }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
        .calendar-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.9rem; border-radius: 12px; cursor: pointer; position: relative; background: var(--bg-panna); border: 2.5px solid transparent; }
        .calendar-day.today { font-weight: bold; background: var(--azzurro-leggero); border: 4px solid #cce0ff; }
        .dots { display: flex; gap: 3px; margin-top: 4px; height: 6px; justify-content: center; }
        .dot { width: 6px; height: 6px; border-radius: 50%; }

        .wash-banner { background: var(--azzurro-polvere); border-radius: 12px; padding: 12px; font-size: 0.9rem; margin-bottom: 15px; color: var(--text-dark); display: flex; justify-content: space-between; align-items: center;}
        .wash-banner > div { text-align: center; flex: 1; }
        .wash-banner-divider { width: 1px; background: var(--pervinca); height: 35px; opacity: 0.5; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: flex-end; justify-content: center; z-index: 2000; padding-bottom: max(30px, env(safe-area-inset-bottom)); }
        .modal-content { background: white; width: 95%; max-width: 500px; padding: 25px; border-radius: 30px; max-height: 85vh; overflow-y: auto; position: relative; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-close { position: absolute; top: 10px; right: 15px; background: none; border: none; font-size: 2rem; padding: 10px; color: var(--text-light); cursor: pointer; }

        .section-builder-item { background: var(--lavanda); padding: 20px; border-radius: 15px; margin-bottom: 15px; position: relative;}
        .option-pill { background: var(--white); color: var(--text-dark); padding: 6px 14px; border-radius: 20px; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; border: 1px solid var(--pervinca); font-weight: 500;}
        .option-pill i { color: var(--color-danger); cursor: pointer; font-size: 1.1rem; }
        
        .palette { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        .color-swatch { width: 38px; height: 38px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .color-swatch.selected { border-color: var(--text-dark); transform: scale(1.15); }
    </style>
</head>
<body>

<div id="app">
    <header><h1 id="view-title">Statistiche</h1></header>

    <main id="view-dashboard" class="page active">
        <div class="card" style="background: var(--lavanda);">
            <h3 id="greeting-title" style="margin-top:0; color: var(--pervinca);"></h3>
            <p id="greeting-text" style="font-size: 0.95rem; color: var(--text-dark); margin-bottom: 0;"></p>
        </div>
        <div id="dash-list"></div>
    </main>

    <main id="view-calendar" class="page">
        <div class="wash-banner" id="wash-stats-banner" style="display:none;">
            <div><i class="fas fa-shower" style="color:var(--pervinca); margin-bottom:4px;"></i><br>Media Mese<br><strong id="avg-month">-</strong></div>
            <div class="wash-banner-divider"></div>
            <div><i class="fas fa-calendar-alt" style="color:var(--pervinca); margin-bottom:4px;"></i><br>Media Totale<br><strong id="avg-total">-</strong></div>
        </div>
        <div class="card">
            <div class="cal-header">
                <button class="cal-nav" onclick="app.changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
                <div id="calendar-month-name"></div>
                <button class="cal-nav" onclick="app.changeMonth(1)"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div style="display:grid; grid-template-columns: repeat(7, 1fr); text-align:center; font-size:0.75rem; color:var(--text-light); margin-bottom:8px; font-weight:bold;">
                <div>L</div><div>M</div><div>M</div><div>G</div><div>V</div><div>S</div><div>D</div>
            </div>
            <div class="calendar-grid" id="calendar-body"></div>
        </div>
    </main>

    <main id="view-manage" class="page">
        <div id="manage-main" style="display: flex; flex-direction: column; gap: 15px;">
            <button class="btn-square" onclick="app.switchManage('treatments')">
                <i class="fas fa-magic"></i>
                <span>Gestisci Trattamenti</span>
            </button>
            <button class="btn-square" onclick="app.switchManage('products')">
                <i class="fas fa-spray-can"></i>
                <span>Gestisci Prodotti</span>
            </button>
        </div>

        <div id="manage-treatments" style="display:none">
            <button onclick="app.switchManage('main')" style="border:none; background:none; color:var(--pervinca); margin-bottom:15px; font-size:1.1rem; cursor:pointer;"><i class="fas fa-arrow-left"></i> Indietro</button>
            <div class="card">
                <h2 id="treat-form-title">Crea Trattamento</h2>
                <input type="text" id="treat-name" placeholder="Nome (es. Lavaggio)">
                <label style="font-size:0.9rem; color:var(--text-light); display:flex; align-items:center; margin-bottom:15px;"><input type="checkbox" id="treat-is-wash" style="width:auto; margin-right:10px;"> Lavaggio principale</label>
                <label>Icona</label>
                <div id="treat-emoji-grid" class="emoji-grid"></div>
                <label>Colore Personalizzato</label>
                <div class="palette" id="treat-colors"></div>
                <div id="section-builder-container"></div>
                <button onclick="app.addSectionToBuilder()" style="background:none; border: 2px dashed var(--pervinca); width:100%; padding:15px; border-radius:10px; margin-bottom:15px; font-weight:600; cursor:pointer;">+ Gruppo Checkbox</button>
                <button class="btn-submit" id="btn-save-treat" onclick="app.saveTreatment()">Salva Trattamento</button>
            </div>
            <div id="treatments-list"></div>
        </div>

        <div id="manage-products" style="display:none">
            <button onclick="app.switchManage('main')" style="border:none; background:none; color:var(--pervinca); margin-bottom:15px; font-size:1.1rem; cursor:pointer;"><i class="fas fa-arrow-left"></i> Indietro</button>
            <div class="card">
                <h2>Nuovo Prodotto</h2>
                <input type="text" id="prod-name" placeholder="Nome Prodotto">
                <input type="text" id="prod-brand" placeholder="Marca">
                <label>Icona</label>
                <div id="prod-emoji-grid" class="emoji-grid"></div>
                <label>Categorie Compatibili</label>
                <div class="checkbox-group" id="prod-treatments-checkboxes" style="margin-top:10px;"></div>
                <button class="btn-submit" onclick="app.saveProduct()">Salva Prodotto</button>
            </div>
            <div id="products-list"></div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active" onclick="app.navigate('dashboard', event)"><i class="fas fa-chart-pie"></i></a>
        <a href="#" class="nav-center-btn" onclick="app.navigate('calendar', event)"><i class="fas fa-calendar-alt"></i></a>
        <a href="#" class="nav-item" onclick="app.navigate('manage', event)"><i class="fas fa-cog"></i></a>
    </nav>
</div>

<div id="modal" class="modal-overlay" onclick="if(event.target === this) this.style.display='none'">
    <div class="modal-content">
        <button class="modal-close" onclick="document.getElementById('modal').style.display='none'">&times;</button>
        <h2 id="modal-date-title" style="text-transform:capitalize;">Data</h2>
        <div id="modal-existing-logs"></div>
        <div style="border-top: 2px dashed var(--azzurro-polvere); padding-top: 25px; margin-top:20px;">
            <h3 id="reg-form-title" style="margin-top:0; color:var(--pervinca);">+ Registra</h3>
            <select id="reg-treatment-select" class="custom-select" onchange="app.renderDynamicRegisterForm()"></select>
            <div id="reg-dynamic-content"></div>
        </div>
    </div>
</div>

<div id="onboarding-modal" class="modal-overlay">
    <div class="modal-content">
        <i class="fas fa-magic" style="font-size: 3.5rem; color: var(--pervinca); margin-bottom: 15px;"></i>
        <h2>Benvenuta!</h2>
        <input type="text" id="user-name-input" placeholder="Il tuo nome" style="text-align: center; font-size:1.2rem;" onkeydown="if(event.key === 'Enter') app.saveName()">
        <button class="btn-submit" onclick="app.saveName()">Inizia</button>
    </div>
</div>

<script>
const TREAT_EMOJIS = ['🚿','🛁','✂️','💇‍♀️','💆‍♀️','🧖‍♀️','🪮','💈','🥣','🧴','💅','🔫']; 
const PROD_EMOJIS = ['🧴','🧼','🫧','💊','🥥','🍯','🥑','🍋','🌸','🧽','💦','🥣'];
const PASTEL_COLORS = ['#AEC6CF', '#FFB6C1', '#FFDAB9', '#98FB98', '#E6E6FA', '#FFC0CB', '#AFEEEE', '#8FBC8F', '#FDFD96', '#B5EAD7', '#C7CEEA', '#FF9AA2', '#E2F0CB', '#E0BBE4'];

const MESSAGES_SUCCESS = ["Bravissima! Ottimo ritmo di pulizia. ✨", "I tuoi capelli ringraziano per l'intervallo perfetto. 🌿", "Ottima gestione della cute! 💧"];
const MESSAGES_ALERT = ["Attenzione! Li stai lavando troppo spesso. 🚿", "Prova a resistere un giorno in più. ⚠️", "Rallenta! Troppi lavaggi seccano i capelli. 🥥"];

const app = {
    db: JSON.parse(localStorage.getItem('hair_tracker_db')) || { userName: null, treatments: [], products: [], logs: [] },
    selectedColor: '',
    selectedTreatEmoji: '🚿',
    selectedProdEmoji: '🧴',
    calendarDate: new Date(), 
    selectedDateForLog: null,
    editingTreatId: null,
    editingLogId: null,

    init() {
        const now = new Date();
        this.calendarDate = new Date(now.getFullYear(), now.getMonth(), 1);
        if(!this.db.userName) document.getElementById('onboarding-modal').style.display = 'flex';
        this.renderEmojiGrids();
        this.renderAll();
    },

    save() {
        localStorage.setItem('hair_tracker_db', JSON.stringify(this.db));
        this.renderAll();
    },

    saveName() {
        const n = document.getElementById('user-name-input').value.trim();
        if(!name) return;
        this.db.userName = n;
        document.getElementById('onboarding-modal').style.display = 'none';
        this.save();
    },

    navigate(view, e) {
        if(e) e.preventDefault();
        
        // 1. Gestione classi attive per menu e pagine
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item, .nav-center-btn').forEach(n => n.classList.remove('active'));
        
        document.getElementById(`view-${view}`).classList.add('active');
        if(e) e.currentTarget.classList.add('active');
        
        // 2. RESET GESTIONE: Se clicco sull'icona gestione, forza il ritorno al menu principale
        if(view === 'manage') {
            this.switchManage('main');
        }

        // 3. --- QUI SCEGLI I TITOLI DELLE TRE SCHERMATE ---
        const titles = { 
            'dashboard': 'Statistiche', 
            'calendar': 'Calendario', 
            'manage': 'Impostazioni' 
        };
        // -----------------------------------------------

        document.getElementById('view-title').innerText = titles[view];
        this.renderAll();
    },

    formatAverage(avgDays) {
        if (avgDays === 0) return "Dati insufficienti";
        if (avgDays < 30) return `ogni ${avgDays.toFixed(1)} giorni`;
        const m = Math.floor(avgDays / 30);
        const d = avgDays % 30;
        return `ogni ${m} mes${m > 1 ? 'i' : 'e'}${d > 0 ? ' e ' + d.toFixed(1) + ' gg' : ''}`;
    },

    renderDashboard() {
        const name = this.db.userName || "Bellezza";
        document.getElementById('greeting-title').innerText = `Ciao ${name} 👋`;
        const washT = this.db.treatments.find(t => t.isWash);
        const textEl = document.getElementById('greeting-text');
        
        if(washT) {
            const washLogs = this.db.logs.filter(l => l.treatId == washT.id).sort((a,b) => new Date(b.date) - new Date(a.date));
            if(washLogs.length > 1) {
                const today = new Date(); today.setHours(0,0,0,0);
                const windowStart = new Date(today); windowStart.setDate(today.getDate() - 6);
                let gaps = [];
                for(let i=0; i < washLogs.length - 1; i++) {
                    const d1 = new Date(washLogs[i].date); d1.setHours(0,0,0,0);
                    if(d1 >= windowStart && d1 <= today) {
                        const d2 = new Date(washLogs[i+1].date); d2.setHours(0,0,0,0);
                        gaps.push((d1 - d2) / 86400000);
                    }
                }
                if(gaps.length) {
                    const avg = gaps.reduce((a,b)=>a+b,0) / gaps.length;
                    textEl.innerHTML = `<strong>Media 7gg: ${avg.toFixed(1)} gg.</strong><br>${(avg >= 3 ? MESSAGES_SUCCESS : MESSAGES_ALERT)[Math.floor(Math.random()*3)]}`;
                } else { textEl.innerText = "Monitora i tuoi lavaggi questa settimana! 🚿"; }
            } else { textEl.innerText = "Benvenuta! Inizia a registrare i tuoi lavaggi. 🛁"; }
        }

        const list = document.getElementById('dash-list');
        list.innerHTML = '';
        this.db.treatments.sort((a,b)=>b.isWash-a.isWash).forEach(t => {
            const logs = this.db.logs.filter(l => l.treatId == t.id).sort((a,b) => new Date(a.date) - new Date(b.date));
            let last = "Mai", avgL = "Dati insufficienti";
            if(logs.length) {
                const diff = Math.floor((new Date() - new Date(logs[logs.length-1].date)) / 86400000);
                last = diff === 0 ? "Oggi" : `${diff}gg fa`;
                if(logs.length > 1) {
                    let total = 0;
                    for(let i=1; i<logs.length; i++) total += (new Date(logs[i].date) - new Date(logs[i-1].date)) / 86400000;
                    avgL = this.formatAverage(total/(logs.length-1));
                }
            }
            list.innerHTML += `<div class="card" style="border-left: 6px solid ${t.color}"><div style="font-size:1.2rem; font-weight:600">${t.emoji} ${t.name}</div><div style="font-size:0.95rem; margin-top:5px; color:var(--text-dark)">Ultima volta: <strong>${last}</strong> | Media: <strong>${avgL}</strong></div></div>`;
        });
    },

    changeMonth(dir) { this.calendarDate.setMonth(this.calendarDate.getMonth() + dir); this.renderCalendar(); },

    getBorderColor(dateStr) {
        const washT = this.db.treatments.find(t => t.isWash);
        if(!washT) return 'transparent';
        const dayLogs = this.db.logs.filter(l => l.date === dateStr && l.treatId == washT.id);
        if(dayLogs.length >= 2) return 'var(--color-danger)';
        if(dayLogs.length === 0) return 'transparent';
        const washes = this.db.logs.filter(l => l.treatId == washT.id).sort((a,b) => new Date(a.date) - new Date(b.date));
        const idx = washes.findIndex(l => l.date === dateStr);
        if(idx <= 0) return 'transparent';
        const gap = (new Date(washes[idx].date) - new Date(washes[idx-1].date)) / 86400000;
        return gap <= 1 ? 'var(--color-danger)' : (gap === 2 ? 'var(--color-warning)' : 'var(--color-success)');
    },

    renderCalendar() {
        const body = document.getElementById('calendar-body');
        const y = this.calendarDate.getFullYear(), m = this.calendarDate.getMonth();
        const prefix = `${y}-${String(m+1).padStart(2,'0')}`;
        document.getElementById('calendar-month-name').innerText = this.calendarDate.toLocaleString('it-IT', { month: 'long', year: 'numeric' }).replace(/^\w/, c => c.toUpperCase());
        
        const washT = this.db.treatments.find(t => t.isWash);
        if(washT) {
            const today = new Date();
            let dConsider = (y === today.getFullYear() && m === today.getMonth()) ? today.getDate() : new Date(y, m+1, 0).getDate();
            const mLogs = this.db.logs.filter(l => l.treatId == washT.id && l.date.startsWith(prefix));
            const avgM = mLogs.length ? (dConsider / mLogs.length) : 0;
            const washes = this.db.logs.filter(l => l.treatId == washT.id).sort((a,b) => new Date(a.date) - new Date(b.date));
            let totalG = 0; for(let i=1; i<washes.length; i++) totalG += (new Date(washes[i].date) - new Date(washes[i-1].date)) / 86400000;
            const avgT = washes.length > 1 ? (totalG / (washes.length - 1)) : 0;
            document.getElementById('avg-month').innerText = avgM > 0 ? this.formatAverage(avgM).replace('ogni ', '') : '-';
            document.getElementById('avg-total').innerText = avgT > 0 ? this.formatAverage(avgT).replace('ogni ', '') : '-';
            document.getElementById('wash-stats-banner').style.display = 'flex';
        }

        body.innerHTML = '';
        const offset = (new Date(y, m, 1).getDay() + 6) % 7;
        const days = new Date(y, m+1, 0).getDate();
        for(let i=0; i<offset; i++) body.innerHTML += '<div></div>';
        for(let i=1; i<=days; i++) {
            const dStr = `${prefix}-${String(i).padStart(2,'0')}`;
            const border = this.getBorderColor(dStr);
            const dLogs = this.db.logs.filter(l => l.date === dStr);
            body.innerHTML += `<div class="calendar-day ${dStr === new Date().toISOString().split('T')[0]?'today':''}" style="border-color:${border}" onclick="app.openDayModal('${dStr}')">${i}<div class="dots">${dLogs.map(l => `<div class="dot" style="background:${this.db.treatments.find(t=>t.id==l.treatId)?.color}"></div>`).join('')}</div></div>`;
        }
    },

    openDayModal(date) {
        this.selectedDateForLog = date; this.editingLogId = null; 
        const logs = this.db.logs.filter(l => l.date === date);
        document.getElementById('modal-date-title').innerText = new Date(date).toLocaleDateString('it-IT', { day:'numeric', month:'long' });
        document.getElementById('modal-existing-logs').innerHTML = logs.map(l => {
            const t = this.db.treatments.find(x => x.id == l.treatId);
            return `<div class="card" style="margin-bottom:15px; padding:15px; border-left:4px solid ${t?.color};"><div style="display:flex; justify-content:space-between; align-items:center;"><span style="font-size:1.15rem; font-weight:600;">${t?.emoji} ${t?.name}</span><div style="display:flex;"><button class="icon-btn edit" onclick="app.editLog(${l.id})"><i class="fas fa-pencil"></i></button><button class="icon-btn delete" onclick="app.deleteLog(${l.id})"><i class="fas fa-trash"></i></button></div></div>${l.products.length ? '<div style="font-size:0.9rem; margin-top:8px;"><strong>Prodotti:</strong> '+l.products.map(pId=>this.db.products.find(px=>px.id==pId)?.name).join(', ')+'</div>' : ''}${l.options.length ? '<div style="font-size:0.85rem; color:var(--text-light); margin-top:4px;">'+l.options.map(o=>`✓ ${o.valore}`).join(' | ')+'</div>' : ''}${l.notes ? '<div style="font-size:0.9rem; margin-top:6px; font-style:italic;">"'+l.notes+'"</div>' : ''}</div>`;
        }).join('') || '<p style="text-align:center; color:var(--text-light)">Nessuna attività.</p>';
        document.getElementById('reg-form-title').innerText = "+ Registra";
        document.getElementById('reg-treatment-select').innerHTML = '<option value="" disabled selected>Seleziona trattamento...</option>' + this.db.treatments.map(t=>`<option value="${t.id}">${t.emoji} ${t.name}</option>`).join('');
        document.getElementById('reg-dynamic-content').innerHTML = '';
        document.getElementById('modal').style.display = 'flex';
    },

    editLog(id) {
        const l = this.db.logs.find(x => x.id == id); if(!l) return;
        this.editingLogId = id; document.getElementById('reg-form-title').innerText = "✏️ Modifica";
        document.getElementById('reg-treatment-select').value = l.treatId;
        this.renderDynamicRegisterForm();
        l.products.forEach(pId => { const cb = document.querySelector(`.reg-prod-check[value="${pId}"]`); if(cb) cb.checked = true; });
        l.options.forEach(opt => { const cb = document.querySelector(`.reg-custom-check[data-sec="${opt.sezione}"][value="${opt.valore}"]`); if(cb) cb.checked = true; });
        document.getElementById('reg-notes').value = l.notes || "";
        const btn = document.querySelector('#reg-dynamic-content .btn-submit'); if(btn) { btn.innerText = "Aggiorna"; btn.style.background = "var(--color-warning)"; }
    },

    renderDynamicRegisterForm() {
        const tId = document.getElementById('reg-treatment-select').value;
        const t = this.db.treatments.find(x => x.id == tId);
        const prods = this.db.products.filter(p => p.treatIds.includes(tId.toString()) || p.treatIds.includes(parseInt(tId)));
        let h = '<h4>Prodotti</h4><div class="checkbox-group">';
        prods.forEach(p => h += `<label class="check-container"><input type="checkbox" class="reg-prod-check" value="${p.id}"><span>${p.emoji} ${p.name}</span></label>`);
        h += '</div>';
        t.sections.forEach(s => { h += `<h4>${s.titolo}</h4><div class="checkbox-group">`; s.opzioni.forEach(o => h += `<label class="check-container"><input type="checkbox" class="reg-custom-check" data-sec="${s.titolo}" value="${o}">${o}</label>`); h += '</div>'; });
        h += '<textarea id="reg-notes" placeholder="Note..." rows="3"></textarea><button class="btn-submit" onclick="app.saveLog()">Salva</button>';
        document.getElementById('reg-dynamic-content').innerHTML = h;
    },

    saveLog() {
        const tId = document.getElementById('reg-treatment-select').value;
        const d = { id: this.editingLogId || Date.now(), date: this.selectedDateForLog, treatId: tId, products: Array.from(document.querySelectorAll('.reg-prod-check:checked')).map(el=>el.value), options: Array.from(document.querySelectorAll('.reg-custom-check:checked')).map(el=>({ sezione: el.dataset.sec, valore: el.value })), notes: document.getElementById('reg-notes').value.trim() };
        if(this.editingLogId) this.db.logs[this.db.logs.findIndex(x=>x.id==this.editingLogId)] = d; else this.db.logs.push(d);
        this.save(); this.openDayModal(this.selectedDateForLog);
    },

    deleteLog(id) { if(confirm("Eliminare?")) { this.db.logs = this.db.logs.filter(x=>x.id!=id); this.save(); this.openDayModal(this.selectedDateForLog); } },

    renderEmojiGrids() {
        document.getElementById('treat-emoji-grid').innerHTML = TREAT_EMOJIS.map(e => `<div class="emoji-item ${e===this.selectedTreatEmoji?'selected':''}" onclick="app.setEmoji('treat','${e}')">${e}</div>`).join('');
        document.getElementById('prod-emoji-grid').innerHTML = PROD_EMOJIS.map(e => `<div class="emoji-item ${e===this.selectedProdEmoji?'selected':''}" onclick="app.setEmoji('prod','${e}')">${e}</div>`).join('');
    },
    setEmoji(t, e) { if(t==='treat') this.selectedTreatEmoji=e; else this.selectedProdEmoji=e; this.renderEmojiGrids(); },
    autoSelectColor() { const used = this.db.treatments.filter(t=>t.id!=this.editingTreatId).map(t=>t.color); const avail = PASTEL_COLORS.filter(c=>!used.includes(c)); this.selectedColor = avail.length ? avail[0] : PASTEL_COLORS[0]; },
    renderColorPalette() {
        const cont = document.getElementById('treat-colors'); if(!cont) return;
        const used = this.db.treatments.filter(t=>t.id!=this.editingTreatId).map(t=>t.color);
        if(!this.selectedColor || (used.includes(this.selectedColor) && !this.editingTreatId)) this.autoSelectColor();
        cont.innerHTML = PASTEL_COLORS.map(c => `<div class="color-swatch ${used.includes(c)?'disabled':''} ${c===this.selectedColor?'selected':''}" style="background:${c}" onclick="app.selectColor('${c}')"></div>`).join('');
    },
    selectColor(c) { if(!this.db.treatments.filter(t=>t.id!=this.editingTreatId).map(t=>t.color).includes(c)) { this.selectedColor = c; this.renderColorPalette(); } },
    
    addSectionToBuilder(t="", opts=[]) {
        const div = document.createElement('div'); div.className = 'section-builder-item';
        div.innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;"><input type="text" class="sb-title" placeholder="Nome Sezione" value="${t}" style="margin:0; flex:1; border:none; border-bottom:2px solid var(--pervinca); background:transparent; font-weight:bold; font-size:1.1rem;"><button class="icon-btn delete" onclick="this.parentElement.parentElement.remove()" style="margin-left:10px;"><i class="fas fa-trash"></i></button></div><div style="display:flex; gap:10px; margin-bottom:15px;"><input type="text" class="sb-new-option" placeholder="Nuova opzione" style="margin:0; flex:1;" onkeydown="if(event.key==='Enter'){event.preventDefault();app.addOptionToPills(this.nextElementSibling);}"><button type="button" onclick="app.addOptionToPills(this)" style="background:var(--pervinca); color:white; border:none; border-radius:12px; padding:0 20px; cursor:pointer;"><i class="fas fa-plus"></i></button></div><div class="sb-options-list" style="display:flex; flex-wrap:wrap; gap:8px;">${opts.map(o=>`<span class="option-pill" data-val="${o}">${o} <i class="fas fa-times" onclick="this.parentElement.remove()"></i></span>`).join('')}</div>`;
        document.getElementById('section-builder-container').appendChild(div);
    },
    addOptionToPills(btn) { const inp = btn.previousElementSibling; const v = inp.value.trim(); if(!v) return; const list = btn.parentElement.nextElementSibling; const s = document.createElement('span'); s.className='option-pill'; s.dataset.val=v; s.innerHTML=`${v} <i class="fas fa-times" onclick="this.parentElement.remove()"></i>`; list.appendChild(s); inp.value=''; },

    saveTreatment() {
        const n = document.getElementById('treat-name').value.trim(); const wash = document.getElementById('treat-is-wash').checked;
        if(!n || !this.selectedColor) return alert("Inserisci Nome e Colore!");
        if(wash) this.db.treatments.forEach(t=>t.isWash=false);
        const secs = Array.from(document.querySelectorAll('.section-builder-item')).map(it=>({ titolo: it.querySelector('.sb-title').value.trim(), opzioni: Array.from(it.querySelectorAll('.option-pill')).map(p=>p.dataset.val) })).filter(s=>s.titolo && s.opzioni.length);
        const d = { id: this.editingTreatId || Date.now(), name: n, emoji: this.selectedTreatEmoji, color: this.selectedColor, isWash: wash, sections: secs };
        if(this.editingTreatId) this.db.treatments[this.db.treatments.findIndex(x=>x.id==this.editingTreatId)] = d; else this.db.treatments.push(d);
        this.save(); this.resetTreatmentForm();
    },
    resetTreatmentForm() { document.getElementById('treat-name').value = ''; document.getElementById('treat-is-wash').checked = false; document.getElementById('section-builder-container').innerHTML = ''; this.editingTreatId = null; document.getElementById('treat-form-title').innerText = "Crea Trattamento"; this.autoSelectColor(); this.renderColorPalette(); this.addSectionToBuilder(); },

    saveProduct() {
        const n = document.getElementById('prod-name').value.trim(); const tIds = Array.from(document.querySelectorAll('.prod-treat-check:checked')).map(el=>el.value);
        if(!n || !tIds.length) return alert("Dati mancanti!");
        this.db.products.push({ id: Date.now(), name: n, brand: document.getElementById('prod-brand').value.trim(), emoji: this.selectedProdEmoji, treatIds: tIds });
        this.save(); document.getElementById('prod-name').value = ''; document.getElementById('prod-brand').value = ''; document.querySelectorAll('.prod-treat-check').forEach(c=>c.checked=false);
    },

    renderAll() { this.renderDashboard(); this.renderCalendar(); this.renderLists(); this.renderColorPalette(); },
    renderLists() {
        document.getElementById('treatments-list').innerHTML = this.db.treatments.map(t=>`<div class="card" style="border-left:4px solid ${t.color}; display:flex; justify-content:space-between; align-items:center;"><span>${t.emoji} ${t.name}</span><div><button class="icon-btn edit" onclick="app.editTreatment(${t.id})"><i class="fas fa-pencil"></i></button><button class="icon-btn delete" onclick="app.delete('treatments', ${t.id})"><i class="fas fa-trash"></i></button></div></div>`).join('');
        document.getElementById('products-list').innerHTML = this.db.products.map(p=>`<div class="card" style="display:flex; justify-content:space-between; align-items:center;"><span>${p.emoji} ${p.name} <small>(${p.brand})</small></span><button class="icon-btn delete" onclick="app.delete('products', ${p.id})"><i class="fas fa-trash"></i></button></div>`).join('');
        document.getElementById('prod-treatments-checkboxes').innerHTML = this.db.treatments.map(t=>`<label class="check-container"><input type="checkbox" class="prod-treat-check" value="${t.id}">${t.emoji} ${t.name}</label>`).join('');
    },
    editTreatment(id) {
        const t = this.db.treatments.find(x=>x.id==id); this.editingTreatId=id; document.getElementById('treat-form-title').innerText="Modifica"; document.getElementById('treat-name').value=t.name; document.getElementById('treat-is-wash').checked=t.isWash; this.setEmoji('treat',t.emoji); this.selectedColor=t.color; this.renderColorPalette(); document.getElementById('section-builder-container').innerHTML=''; t.sections.forEach(s=>this.addSectionToBuilder(s.titolo,s.opzioni)); document.getElementById('view-manage').scrollIntoView();
    },
    delete(type, id) { if(confirm("Eliminare?")) { this.db[type] = this.db[type].filter(x=>x.id!=id); this.save(); } },
    switchManage(v) { document.getElementById('manage-main').style.display = (v==='main')?'flex':'none'; document.getElementById('manage-treatments').style.display = (v==='treatments')?'block':'none'; document.getElementById('manage-products').style.display = (v==='products')?'block':'none'; }
};
app.init();
</script>
</body>
</html>
